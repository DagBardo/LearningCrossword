<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Learning Crossword</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="app">
    <header class="hero">
      <h2>Learning Crossword Lab</h2>
    </header>

<section class="controls" aria-label="Puzzle controls">
  <label>
    Topic
    <input id="topicInput" value="Shakespeare" placeholder="e.g., Buddhism, Shakespeare, Australian wildlife" />
  </label>

  <label>
    Difficulty
    <select id="difficultySelect">
      <option value="1">1 — easy</option>
      <option value="2">2 — gentle</option>
      <option value="3" selected>3 — medium</option>
      <option value="4">4 — hard</option>
      <option value="5">5 — fiendish</option>
    </select>
  </label>

  <button id="generateBtn">Generate Puzzle</button>
  <button id="checkBtn">Check</button>
  <button id="checkWordBtn">Check Word</button>
  <button id="revealWordBtn">Reveal Word</button>
  <button id="revealBtn">Reveal</button>
  <button id="clearBtn">Clear</button>
</section>

 <section class="history">
  <h2>Recent Topics</h2>
  <div id="topicHistory" class="topic-history"></div>
</section>

    <section class="meta" id="meta"></section>
    <section class="status" id="status" role="status" aria-live="polite"></section>
    <section class="metrics" id="metrics"></section>
    <section class="board-section">
      <div id="grid" class="grid" aria-label="Crossword grid"></div>
    </section>

    <section class="clues" aria-label="Clues">
      <section>
        <h2>Across</h2>
        <ol id="acrossClues"></ol>
      </section>
      <section>
        <h2>Down</h2>
        <ol id="downClues"></ol>
      </section>
    </section>

    <section class="study" id="studyPanel">
        <h2>Study Mode</h2>
        <div id="studyContent">Click a clue to see its answer note here.</div>
    </section>

<section class="notes" hidden>
  <h2>Answer notes</h2>
  <div id="answerNotes"></div>
</section>
  </main>

<script type="module" src="src/app.js?v=20"></script>
</body>
</html>
